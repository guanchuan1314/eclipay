version: '3.8'

services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eclipay_frontend_dev
    restart: unless-stopped
    ports:
      - "3000:3000"  # Only expose frontend port to host
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - eclipay_network
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: ./frontend/package.json

  backend:
    build: 
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for dev with source maps
    container_name: eclipay_backend_dev
    restart: unless-stopped
    # No host ports exposed - internal only
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-eclipay}
      - DB_PASSWORD=${DB_PASSWORD:-eclipay_password}
      - DB_NAME=${DB_NAME:-eclipay}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-development-key-change-in-production}
      - JWT_SECRET=${JWT_SECRET:-development-jwt-secret}
    volumes:
      - uploads_data:/app/uploads
      - ./src:/app/src
      - ./package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eclipay_network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./package.json

  postgres:
    image: postgres:15-alpine
    container_name: eclipay_postgres_dev
    restart: unless-stopped
    # No host ports exposed - internal only
    environment:
      - POSTGRES_DB=${DB_NAME:-eclipay}
      - POSTGRES_USER=${DB_USERNAME:-eclipay}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-eclipay_password}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/migrations/001-initial-schema.sql:/docker-entrypoint-initdb.d/001-initial-schema.sql
      - ./src/database/migrations/002-multi-project.sql:/docker-entrypoint-initdb.d/002-multi-project.sql
      - ./src/database/migrations/003-per-project-master-wallets.sql:/docker-entrypoint-initdb.d/003-per-project-master-wallets.sql
    networks:
      - eclipay_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-eclipay} -d ${DB_NAME:-eclipay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eclipay_redis_dev
    restart: unless-stopped
    # No host ports exposed - internal only
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - eclipay_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  eclipay_network:
    driver: bridge
    name: eclipay_dev